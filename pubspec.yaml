name: restaurant_roulette
description: A hybrid-api restaurant finder app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  
  # Networking & APIs
  dio: ^5.4.0
  geolocator: ^10.1.0
  
  # Firebase & Auth
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  google_sign_in: ^6.2.1
  
  # UI & Animation
  flutter_fortune_wheel: ^1.3.1
  flutter_spinkit: ^5.2.0
  google_nav_bar: ^5.0.6
  google_fonts: ^6.1.0
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Navigation & Utils
  url_launcher: ^6.2.4 # NEU: Für Google Maps
  rxdart: ^0.27.7
  equatable: ^2.0.5
  
  # Ads
  google_mobile_ads: ^4.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
