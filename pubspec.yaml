name: restaurant_roulette
description: A hybrid-api restaurant finder app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  
  # Networking & APIs
  dio: ^5.4.0
  geolocator: ^10.1.0
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  
  # UI & Animation
  flutter_fortune_wheel: ^1.3.1
  flutter_spinkit: ^5.2.0
  google_nav_bar: ^5.0.6
  google_fonts: ^6.1.0
  
  # Ads
  google_mobile_ads: ^4.0.0

  # Utils
  rxdart: ^0.27.7 # Nützlich für Streams beim Roulette
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
